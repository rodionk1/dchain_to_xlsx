<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Data Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            align-items: flex-start;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 500;
        }
        
        .file-input-label:hover {
            transform: translateY(-2px);
        }
        
        .file-name {
            padding: 12px 24px;
            background: #f5f5f5;
            border-radius: 4px;
            color: #333;
            min-width: 200px;
            text-align: center;
        }
        
        .region-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .region-selector label {
            font-weight: 500;
            color: #333;
        }
        
        .region-selector select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .extract-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .extract-btn:hover {
            transform: translateY(-2px);
        }
        
        .extract-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 30px;
            display: none;
        }
        
        .table-container.show {
            display: block;
        }
        
        .table-info {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        
        .table-info h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .table-info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        thead {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }
        
        tbody tr:hover {
            background: #f9f9f9;
        }
        
        tbody tr:nth-child(even) {
            background: #fafafa;
        }
        
        .isotope-col {
            font-weight: 500;
            color: #667eea;
            min-width: 80px;
        }
        
        .export-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Activation Data Viewer</h1>
            <p>Extract and visualize activation tables from PHITS output files</p>
        </header>
        
        <div class="content">
            <!-- File Upload Section -->
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".act" />
                    <label for="fileInput" class="file-input-label">📂 Choose .act File</label>
                </div>
                <div class="file-name" id="fileName">No file selected</div>
            </div>
            
            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
            
            <!-- Region Selector -->
            <div id="regionSelectorContainer" style="display: none;">
                <div class="region-selector">
                    <label for="regionSelect">🔍 Select Region:</label>
                    <select id="regionSelect">
                        <option value="">Loading regions...</option>
                    </select>
                    <button class="extract-btn" id="extractBtn" disabled>Extract Data</button>
                </div>
            </div>
            
            <!-- Loading Spinner -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Processing data...</p>
            </div>
            
            <!-- Table Display -->
            <div id="tableContainer" class="table-container">
                <div class="table-info">
                    <h2>Activation Table</h2>
                    <p id="tableMetadata"></p>
                </div>
                <table id="dataTable">
                    <thead id="tableHead">
                        <tr>
                            <th style="width: 20%;">Isotope</th>
                            <th style="width: 40%;">Atoms (atoms/cc)</th>
                            <th style="width: 40%;">Activity (Bq/cc)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
                <button class="export-btn" id="exportBtn">📥 Export as CSV</button>
            </div>
        </div>
    </div>

    <script>
        let currentFilePath = null;
        let currentRegions = null;
        let currentData = null;

        // File upload handler
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name;

            const formData = new FormData();
            formData.append('file', file);

            showLoading(true);
            showStatus('', '');

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    currentFilePath = result.filepath;
                    currentRegions = result.regions;

                    // Populate region selector
                    const regionSelect = document.getElementById('regionSelect');
                    regionSelect.innerHTML = '';
                    
                    result.regions.forEach(region => {
                        const option = document.createElement('option');
                        option.value = region.region;
                        option.textContent = `Region ${region.region} - Time: ${region.time} ${region.time_unit || ''}`;
                        regionSelect.appendChild(option);
                    });

                    document.getElementById('regionSelectorContainer').style.display = 'block';
                    document.getElementById('extractBtn').disabled = false;
                    showStatus('File uploaded successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Error uploading file: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Extract data handler
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const region = document.getElementById('regionSelect').value;
            
            if (!region || !currentFilePath) {
                showStatus('Please select a region', 'error');
                return;
            }

            showLoading(true);
            showStatus('', '');

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filepath: currentFilePath,
                        region: parseInt(region)
                    })
                });

                const result = await response.json();

                if (result.data) {
                    currentData = result;
                    displayTable(result);
                    showStatus('Data extracted successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Error extracting data: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Display table
        function displayTable(data) {
            const tableBody = document.getElementById('tableBody');
            const tableHead = document.getElementById('tableHead');
            
            // Clear existing content
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            
            // Create header row with time columns
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th style="width: 15%;">Isotope</th>';
            
            data.times.forEach(time => {
                headerRow.innerHTML += `<th style="width: ${80/data.times.length}%;">${time}</th>`;
            });
            tableHead.appendChild(headerRow);
            
            // Create data rows
            data.isotopes.forEach(isotope => {
                const row = document.createElement('tr');
                row.innerHTML = `<td class="isotope-col">${isotope}</td>`;
                
                data.times.forEach(time => {
                    const activity = data.data[isotope][time] || 0;
                    const formattedActivity = activity > 0 ? activity.toExponential(4) : '0.0000E+00';
                    row.innerHTML += `<td>${formattedActivity}</td>`;
                });
                
                tableBody.appendChild(row);
            });
            
            // Update metadata
            const metadata = `Region: ${data.region} | Time Points: ${data.times.length} | Isotopes: ${data.isotopes.length}`;
            document.getElementById('tableMetadata').textContent = metadata;

            // Show table
            document.getElementById('tableContainer').classList.add('show');
        }

        // Export to CSV
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!currentData) return;

            // Create CSV header
            let csv = 'Isotope';
            currentData.times.forEach(time => {
                csv += `,${time}`;
            });
            csv += '\n';

            // Add data rows
            currentData.isotopes.forEach(isotope => {
                csv += isotope;
                currentData.times.forEach(time => {
                    const activity = currentData.data[isotope][time] || 0;
                    csv += `,${activity}`;
                });
                csv += '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `activation_table_region${currentData.region}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // Utility functions
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            if (!message) {
                statusEl.style.display = 'none';
                return;
            }
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'block';
        }
    </script>
</body>
</html>
