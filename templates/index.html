<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Data Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            align-items: flex-start;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 500;
        }
        
        .file-input-label:hover {
            transform: translateY(-2px);
        }
        
        .file-name {
            padding: 12px 24px;
            background: #f5f5f5;
            border-radius: 4px;
            color: #333;
            min-width: 200px;
            text-align: center;
        }
        
        .region-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .region-selector label {
            font-weight: 500;
            color: #333;
        }
        
        .region-selector select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .export-options {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .export-options label {
            font-weight: 500;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .export-options input[type="text"],
        .export-options input[type="file"] {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .export-options input[type="text"] {
            min-width: 150px;
        }
        
        .extract-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .extract-btn:hover {
            transform: translateY(-2px);
        }
        
        .extract-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 30px;
            display: none;
        }
        
        .table-container.show {
            display: block;
        }
        
        .table-info {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        
        .table-info h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .table-info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        thead {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }
        
        tbody tr:hover {
            background: #f9f9f9;
        }
        
        tbody tr:nth-child(even) {
            background: #fafafa;
        }
        
        .isotope-col {
            font-weight: 500;
            color: #667eea;
            min-width: 80px;
        }
        
        .export-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Activation Data Viewer</h1>
            <p>Extract and visualize activation tables from PHITS output files</p>
        </header>
        
        <div class="content">
            <!-- File Upload Section -->
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".act" />
                    <label for="fileInput" class="file-input-label">📂 Choose .act File</label>
                </div>
                <div class="file-name" id="fileName">No file selected</div>
                <div class="export-options">
                    <label for="sheetNameInput">Sheet Name:</label>
                    <input type="text" id="sheetNameInput" placeholder="Enter sheet name" value="All Regions" />
                    <label for="existingFileInput">Add to existing Excel:</label>
                    <input type="file" id="existingFileInput" accept=".xlsx,.xls" />
                    <button class="export-btn" id="exportBtn">📥 Export as XLSX</button>
                </div>
            </div>
            
            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
            
            <!-- Region Selector -->
            <div id="regionSelectorContainer" style="display: none;">
                <div class="region-selector">
                    <label for="regionSelect">🔍 Select Region:</label>
                    <select id="regionSelect">
                        <option value="">Loading regions...</option>
                    </select>
                    <button class="extract-btn" id="extractBtn" disabled>Extract Data</button>
                </div>
            </div>
            
            <!-- Loading Spinner -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Processing data...</p>
            </div>
            
            <!-- Table Display -->
            <div id="tableContainer" class="table-container">
                <div class="table-info">
                    <h2>Activation Table</h2>
                    <p id="tableMetadata"></p>
                </div>
                <table id="dataTable">
                    <thead id="tableHead">
                        <tr>
                            <th style="width: 20%;">Nuclide</th>
                            <th style="width: 40%;">Atoms (atoms/cc)</th>
                            <th style="width: 40%;">Activity (Bq)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentFilePath = null;
        let currentRegions = null;
        let currentData = null;

        // File upload handler
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name;

            const formData = new FormData();
            formData.append('file', file);

            showLoading(true);
            showStatus('', '');

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    currentFilePath = result.filepath;
                    currentRegions = result.regions;

                    // Populate region selector
                    const regionSelect = document.getElementById('regionSelect');
                    regionSelect.innerHTML = '';
                    
                    result.regions.forEach(region => {
                        const option = document.createElement('option');
                        option.value = region.region;
                        option.textContent = `Region ${region.region}`;
                        regionSelect.appendChild(option);
                    });

                    document.getElementById('regionSelectorContainer').style.display = 'block';
                    document.getElementById('extractBtn').disabled = false;
                    showStatus('File uploaded successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Error uploading file: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Extract data handler
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const region = document.getElementById('regionSelect').value;
            
            if (!region || !currentFilePath) {
                showStatus('Please select a region', 'error');
                return;
            }

            showLoading(true);
            showStatus('', '');

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filepath: currentFilePath,
                        region: parseInt(region)
                    })
                });

                const result = await response.json();

                if (result.data) {
                    currentData = result;
                    displayTable(result);
                    showStatus('Data extracted successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Error extracting data: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Display table
        function displayTable(data) {
            const tableBody = document.getElementById('tableBody');
            const tableHead = document.getElementById('tableHead');
            
            // Clear existing content
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            
            // Create header row with time columns
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th style="width: 10%;">Nuclide</th><th style="width: 10%;">Half-life</th><th style="width: 5%;">Unit</th>';
            
            data.times.forEach(time => {
                const formattedTime = formatCooldownTime(time);
                headerRow.innerHTML += `<th style="width: ${70/data.times.length}%;">${formattedTime}</th>`;
            });
            tableHead.appendChild(headerRow);
            
            // Create data rows
            data.isotopes.forEach(isotope => {
                const row = document.createElement('tr');
                const isotopeData = data.data[isotope];
                row.innerHTML = `<td class="isotope-col">${isotope}</td>
                                <td>${isotopeData.half_life}</td>
                                <td>${isotopeData.half_life_unit}</td>`;
                
                data.times.forEach(time => {
                    const activity = isotopeData[time] || 0;
                    const formattedActivity = activity > 0 ? activity.toExponential(4) : '0.0000E+00';
                    row.innerHTML += `<td>${formattedActivity}</td>`;
                });
                
                tableBody.appendChild(row);
            });
            
            // Update metadata
            const metadata = `Region: ${data.region} | Time Points: ${data.times.length} | Isotopes: ${data.isotopes.length}`;
            document.getElementById('tableMetadata').textContent = metadata;

            // Show table
            document.getElementById('tableContainer').classList.add('show');
        }

        // Format cooldown time for display
        function formatCooldownTime(timeStr) {
            // If it's already formatted with irradiation/cooldown labels, return as-is
            if (timeStr.includes('irradiation:') || timeStr.includes('cooldown:')) {
                return timeStr;
            }
            
            // Parse the time string
            const match = timeStr.match(/([0-9.E+-]+)\s*\[([a-zA-Z]+)\]/);
            if (!match) return timeStr;
            
            const value = parseFloat(match[1]);
            const unit = match[2];
            
            // If cooldown time is zero, return "irradiation"
            if (Math.abs(value) < 1e-10) {
                return 'irradiation';
            }
            
            // Convert to appropriate units
            if (unit === 's') {
                if (value < 60) return `${value.toFixed(1)} s`;
                if (value < 3600) return `${(value/60).toFixed(1)} m`;
                if (value < 86400) return `${(value/3600).toFixed(1)} h`;
                return `${(value/86400).toFixed(1)} d`;
            } else if (unit === 'm') {
                if (value < 60) return `${value.toFixed(1)} m`;
                return `${(value/60).toFixed(1)} h`;
            } else if (unit === 'h') {
                if (value < 24) return `${value.toFixed(1)} h`;
                return `${(value/24).toFixed(1)} d`;
            } else if (unit === 'd') {
                if (value < 365) return `${value.toFixed(1)} d`;
                return `${(value/365).toFixed(1)} y`;
            }
            return timeStr;
        }

        function normalizeNuclideName(name) {
            return String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        // Export to XLSX
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (!currentRegions || !currentFilePath) return;

            const sheetName = document.getElementById('sheetNameInput').value || 'All Regions';
            const existingFileInput = document.getElementById('existingFileInput');
            const existingFile = existingFileInput && existingFileInput.files[0];

            showLoading(true);
            showStatus('', '');

            // choose file for saving (prompt save dialog)
            let saveHandle = null;
            if (window.showSaveFilePicker) {
                try {
                    const defaultName = existingFile ? existingFile.name : `activation_table_${sheetName.replace(/\s+/g,'_')}.xlsx`;
                    saveHandle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [
                            {
                                description: 'Excel Files',
                                accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
                            }
                        ]
                    });
                } catch (err) {
                    console.warn('Save dialog cancelled', err);
                }
            }

            try {
                const mzaResponse = await fetch('/api/mza');
                const mzaResult = await mzaResponse.json();
                if (!mzaResult.success || !mzaResult.mza) {
                    throw new Error(mzaResult.error || 'Unable to load MZA data');
                }
                const mzaMap = mzaResult.mza;

                // Load existing workbook or create new one
                let wb;
                if (existingFile) {
                    const arrayBuffer = await existingFile.arrayBuffer();
                    wb = XLSX.read(arrayBuffer, { type: 'array' });
                    // Clear the file input to release file lock
                    existingFileInput.value = '';
                } else {
                    wb = XLSX.utils.book_new();
                }

                const allData = [];
                const excelSci2SigFormat = '0.0E+00';
                allData.push(['Activation Data - All Regions - Activity values in Bq']);
                allData.push(['']); // Empty row

                for (const regionInfo of currentRegions) {
                    const region = regionInfo.region;

                    const response = await fetch('/api/extract', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            filepath: currentFilePath,
                            region: parseInt(region)
                        })
                    });

                    const result = await response.json();

                    if (result.data) {
                        // Build region table with a second ratio table to the right.
                        const activationColumnCount = 3 + result.times.length;
                        const ratioStartCol = activationColumnCount + 2; // two empty columns separation

                        const regionHeaderRow = [];
                        regionHeaderRow[0] = `Region ${region}`;
                        regionHeaderRow[ratioStartCol] = `Region ${region} - Activity/MZA`;
                        allData.push(regionHeaderRow);
                        allData.push([]); // Empty row

                        // Create paired header rows for activation and ratio tables.
                        const labelsRow = [];
                        const headerRow = [];
                        labelsRow[0] = 'Nuclide';
                        labelsRow[1] = 'Half-life';
                        labelsRow[2] = 'Unit';
                        headerRow[0] = '';
                        headerRow[1] = '';
                        headerRow[2] = '';

                        labelsRow[ratioStartCol] = 'MZA';
                        headerRow[ratioStartCol] = '';

                        result.times.forEach((time, idx) => {
                            const formattedTime = formatCooldownTime(time);
                            let label = '';
                            let value = formattedTime;
                            if (formattedTime.includes(':')) {
                                const parts = formattedTime.split(':');
                                label = parts[0].trim();
                                value = (parts[1] || '').trim();
                            }

                            labelsRow[3 + idx] = label;
                            headerRow[3 + idx] = value;

                            labelsRow[ratioStartCol + 1 + idx] = label;
                            headerRow[ratioStartCol + 1 + idx] = value;
                        });

                        allData.push(labelsRow);
                        allData.push(headerRow);

                        // Add data rows for all isotopes and corresponding Activity/MZA ratios.
                        result.isotopes.forEach(isotope => {
                            const isotopeData = result.data[isotope];
                            const rowIndex = allData.length;
                            const row = [];
                            row[0] = isotope;
                            row[1] = isotopeData.half_life;
                            row[2] = isotopeData.half_life_unit;

                            result.times.forEach((time, idx) => {
                                const activity = isotopeData[time] || 0;
                                row[3 + idx] = {
                                    t: 'n',
                                    v: Number(activity),
                                    z: excelSci2SigFormat
                                };
                            });

                            const mza = mzaMap[normalizeNuclideName(isotope)];
                            if (typeof mza === 'number' && mza > 0) {
                                row[ratioStartCol] = {
                                    t: 'n',
                                    v: Number(mza),
                                    z: excelSci2SigFormat
                                };

                                result.times.forEach((time, idx) => {
                                    const activityCellRef = XLSX.utils.encode_cell({ r: rowIndex, c: 3 + idx });
                                    const mzaCellRef = XLSX.utils.encode_cell({ r: rowIndex, c: ratioStartCol });
                                    row[ratioStartCol + 1 + idx] = {
                                        t: 'n',
                                        f: `${activityCellRef}/${mzaCellRef}`,
                                        z: excelSci2SigFormat
                                    };
                                });
                            } else {
                                row[ratioStartCol] = '';
                                result.times.forEach((time, idx) => {
                                    row[ratioStartCol + 1 + idx] = '';
                                });
                            }

                            allData.push(row);
                        });

                        allData.push(['']); // Empty row after each region
                        allData.push(['']); // Another empty row
                    } else {
                        console.error(`Error extracting data for region ${region}:`, result.error);
                    }
                }

                const ws = XLSX.utils.aoa_to_sheet(allData);
                XLSX.utils.book_append_sheet(wb, ws, sheetName);

                // Save the file
                if (saveHandle) {
                    try {
                        const writable = await saveHandle.createWritable();
                        const data = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                        await writable.write(data);
                        await writable.close();
                    } catch (err) {
                        console.error('Error writing to file', err);
                        // fallback to download
                        const filename = `activation_table_${sheetName.replace(/\s+/g,'_')}.xlsx`;
                        XLSX.writeFile(wb, filename);
                    }
                } else {
                    const filename = `activation_table_${sheetName.replace(/\s+/g,'_')}.xlsx`;
                    XLSX.writeFile(wb, filename);
                }

                showStatus('Data exported successfully!', 'success');
            } catch (error) {
                showStatus('Error exporting data: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Utility functions
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            if (!message) {
                statusEl.style.display = 'none';
                return;
            }
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'block';
        }
    </script>
</body>
</html>
