<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Data Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-section {
            margin-bottom: 40px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(220px, 1fr));
            gap: 20px;
            align-items: start;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 44px;
            padding: 0 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 500;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .field-label {
            font-weight: 500;
            color: #333;
            font-size: 13px;
        }

        .field-value,
        .sheet-name-input {
            padding: 10px 12px;
            background: #f5f5f5;
            border-radius: 4px;
            border: 1px solid #ddd;
            color: #333;
            min-height: 42px;
            font-size: 14px;
        }

        .language-select {
            padding: 10px 12px;
            background: #f5f5f5;
            border-radius: 4px;
            border: 1px solid #ddd;
            color: #333;
            min-height: 42px;
            font-size: 14px;
        }

        .field-value {
            display: flex;
            align-items: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .region-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .region-selector label {
            font-weight: 500;
            color: #333;
        }
        
        .region-selector select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .extract-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        .extract-btn:hover {
            transform: translateY(-2px);
        }
        
        .extract-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 30px;
            display: none;
        }
        
        .table-container.show {
            display: block;
        }
        
        .table-info {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        
        .table-info h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .table-info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        thead {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }
        
        tbody tr:hover {
            background: #f9f9f9;
        }
        
        tbody tr:nth-child(even) {
            background: #fafafa;
        }
        
        .isotope-col {
            font-weight: 500;
            color: #667eea;
            min-width: 80px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Activation Data Viewer</h1>
            <p>Extract and visualize activation tables from PHITS output files</p>
        </header>
        
        <div class="content">
            <!-- File Upload Section -->
            <div class="upload-section">
                <div class="controls-grid">
                    <div class="control-item">
                        <div class="file-input-wrapper">
                            <input type="file" id="fileInput" accept=".act" />
                            <label for="fileInput" class="action-btn">📂 Choose .act File</label>
                        </div>
                        <label class="field-label" for="fileName">Selected ACT File</label>
                        <div class="field-value" id="fileName">No file selected</div>
                    </div>

                    <div class="control-item">
                        <div class="file-input-wrapper">
                            <input type="file" id="existingFileInput" accept=".xlsx,.xls" />
                            <label for="existingFileInput" class="action-btn">📄 Select XLSX to Update</label>
                        </div>
                        <label class="field-label" for="existingFileName">Selected XLSX File</label>
                        <div class="field-value" id="existingFileName">New workbook will be created</div>
                    </div>

                    <div class="control-item">
                        <button class="action-btn" id="exportBtn">📥 Export as XLSX</button>
                        <label class="field-label" for="sheetNameInput">New Excel Sheet Name</label>
                        <input type="text" class="sheet-name-input" id="sheetNameInput" placeholder="Enter sheet name" value="All Regions" />
                        <label class="field-label" for="languageSelect">Export Language</label>
                        <select class="language-select" id="languageSelect">
                            <option value="en" selected>English</option>
                            <option value="ru">Russian</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
            
            <!-- Region Selector -->
            <div id="regionSelectorContainer" style="display: none;">
                <div class="region-selector">
                    <label for="regionSelect">🔍 Select Region:</label>
                    <select id="regionSelect">
                        <option value="">Loading regions...</option>
                    </select>
                    <button class="extract-btn" id="extractBtn" disabled>Extract Data</button>
                </div>
            </div>
            
            <!-- Loading Spinner -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Processing data...</p>
            </div>
            
            <!-- Table Display -->
            <div id="tableContainer" class="table-container">
                <div class="table-info">
                    <h2>Activation Table</h2>
                    <p id="tableMetadata"></p>
                </div>
                <table id="dataTable">
                    <thead id="tableHead">
                        <tr>
                            <th style="width: 20%;">Nuclide</th>
                            <th style="width: 40%;">Atoms (atoms/cc)</th>
                            <th style="width: 40%;">Activity (Bq)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentFilePath = null;
        let currentRegions = null;
        let currentData = null;

        const EXPORT_I18N = {
            en: {
                nuclide: 'Nuclide',
                halfLife: 'Half-life',
                unit: 'Unit',
                mza: 'MZA',
                irradiation: 'irradiation',
                cooldown: 'cooldown',
                activityValuesInBq: 'Activity values in Bq',
                activityOverMza: 'Activity/MZA',
                region: 'Region',
                allRegions: 'All Regions',
                activationData: 'Activation Data',
                units: {
                    d: 'd',
                    y: 'y',
                    h: 'h',
                    m: 'm',
                    s: 's'
                }
            },
            ru: {
                nuclide: 'нуклид',
                halfLife: 'T1/2',
                unit: 'ед.',
                mza: 'МЗА',
                irradiation: 'облучение',
                cooldown: 'выдержка',
                activityValuesInBq: 'Активность в Бк',
                activityOverMza: 'А/МЗА',
                region: 'ячейка',
                allRegions: 'Все ячейки',
                activationData: 'Активность',
                units: {
                    d: 'дн',
                    y: 'лет',
                    h: 'ч',
                    m: 'мин',
                    s: 'сек'
                }
            }
        };

        function tr(lang, key) {
            const dict = EXPORT_I18N[lang] || EXPORT_I18N.en;
            return dict[key] || EXPORT_I18N.en[key] || key;
        }

        function localizeTimeUnit(unit, lang) {
            const dict = EXPORT_I18N[lang] || EXPORT_I18N.en;
            return (dict.units && dict.units[unit]) ? dict.units[unit] : unit;
        }

        function localizeUnitTokensInText(text, lang) {
            return String(text).replace(/\b([smhdy])\b/g, (match, unitToken) => localizeTimeUnit(unitToken, lang));
        }

        document.getElementById('existingFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            document.getElementById('existingFileName').textContent = file ? file.name : 'New workbook will be created';
        });

        // File upload handler
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name;

            const formData = new FormData();
            formData.append('file', file);

            showLoading(true);
            showStatus('', '');

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    currentFilePath = result.filepath;
                    currentRegions = result.regions;

                    // Populate region selector
                    const regionSelect = document.getElementById('regionSelect');
                    regionSelect.innerHTML = '';
                    
                    result.regions.forEach(region => {
                        const option = document.createElement('option');
                        option.value = region.region;
                        option.textContent = `Region ${region.region}`;
                        regionSelect.appendChild(option);
                    });

                    document.getElementById('regionSelectorContainer').style.display = 'block';
                    document.getElementById('extractBtn').disabled = false;
                    showStatus('File uploaded successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Error uploading file: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Extract data handler
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const region = document.getElementById('regionSelect').value;
            
            if (!region || !currentFilePath) {
                showStatus('Please select a region', 'error');
                return;
            }

            showLoading(true);
            showStatus('', '');

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filepath: currentFilePath,
                        region: parseInt(region)
                    })
                });

                const result = await response.json();

                if (result.data) {
                    currentData = result;
                    displayTable(result);
                    showStatus('Data extracted successfully!', 'success');
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Error extracting data: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Display table
        function displayTable(data) {
            const tableBody = document.getElementById('tableBody');
            const tableHead = document.getElementById('tableHead');
            
            // Clear existing content
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            
            // Create header row with time columns
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th style="width: 10%;">Nuclide</th><th style="width: 10%;">Half-life</th><th style="width: 5%;">Unit</th>';
            
            data.times.forEach(time => {
                const formattedTime = formatCooldownTime(time);
                headerRow.innerHTML += `<th style="width: ${70/data.times.length}%;">${formattedTime}</th>`;
            });
            tableHead.appendChild(headerRow);
            
            // Create data rows
            data.isotopes.forEach(isotope => {
                const row = document.createElement('tr');
                const isotopeData = data.data[isotope];
                row.innerHTML = `<td class="isotope-col">${isotope}</td>
                                <td>${isotopeData.half_life}</td>
                                <td>${isotopeData.half_life_unit}</td>`;
                
                data.times.forEach(time => {
                    const activity = isotopeData[time] || 0;
                    const formattedActivity = activity > 0 ? activity.toExponential(4) : '0.0000E+00';
                    row.innerHTML += `<td>${formattedActivity}</td>`;
                });
                
                tableBody.appendChild(row);
            });
            
            // Update metadata
            const metadata = `Region: ${data.region} | Time Points: ${data.times.length} | Isotopes: ${data.isotopes.length}`;
            document.getElementById('tableMetadata').textContent = metadata;

            // Show table
            document.getElementById('tableContainer').classList.add('show');
        }

        // Format cooldown time for display
        function formatCooldownTime(timeStr, lang = 'en') {
            const dict = EXPORT_I18N[lang] || EXPORT_I18N.en;

            // If it's already formatted with irradiation/cooldown labels, return as-is
            if (timeStr.includes('irradiation:') || timeStr.includes('cooldown:')) {
                if (lang === 'ru') {
                    const translated = timeStr
                        .replace('irradiation:', `${dict.irradiation}:`)
                        .replace('cooldown:', `${dict.cooldown}:`);
                    return localizeUnitTokensInText(translated, lang);
                }
                return timeStr;
            }
            
            // Parse the time string
            const match = timeStr.match(/([0-9.E+-]+)\s*\[([a-zA-Z]+)\]/);
            if (!match) return timeStr;
            
            const value = parseFloat(match[1]);
            const unit = match[2];
            
            // If cooldown time is zero, return "irradiation"
            if (Math.abs(value) < 1e-10) {
                return dict.irradiation;
            }
            
            // Convert to appropriate units
            if (unit === 's') {
                if (value < 60) return `${value.toFixed(1)} ${dict.units.s}`;
                if (value < 3600) return `${(value/60).toFixed(1)} ${dict.units.m}`;
                if (value < 86400) return `${(value/3600).toFixed(1)} ${dict.units.h}`;
                return `${(value/86400).toFixed(1)} ${dict.units.d}`;
            } else if (unit === 'm') {
                if (value < 60) return `${value.toFixed(1)} ${dict.units.m}`;
                return `${(value/60).toFixed(1)} ${dict.units.h}`;
            } else if (unit === 'h') {
                if (value < 24) return `${value.toFixed(1)} ${dict.units.h}`;
                return `${(value/24).toFixed(1)} ${dict.units.d}`;
            } else if (unit === 'd') {
                if (value < 365) return `${value.toFixed(1)} ${dict.units.d}`;
                return `${(value/365).toFixed(1)} ${dict.units.y}`;
            }
            return timeStr;
        }

        function normalizeNuclideName(name) {
            return String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        // Export to XLSX
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (!currentRegions || !currentFilePath) return;

            const sheetName = document.getElementById('sheetNameInput').value || 'All Regions';
            const exportLanguage = document.getElementById('languageSelect').value === 'ru' ? 'ru' : 'en';
            const existingFileInput = document.getElementById('existingFileInput');
            const existingFile = existingFileInput && existingFileInput.files[0];

            showLoading(true);
            showStatus('', '');

            // choose file for saving (prompt save dialog)
            let saveHandle = null;
            if (window.showSaveFilePicker) {
                try {
                    const defaultName = existingFile ? existingFile.name : `activation_table_${sheetName.replace(/\s+/g,'_')}.xlsx`;
                    saveHandle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [
                            {
                                description: 'Excel Files',
                                accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
                            }
                        ]
                    });
                } catch (err) {
                    console.warn('Save dialog cancelled', err);
                }
            }

            try {
                const mzaResponse = await fetch('/api/mza');
                const mzaResult = await mzaResponse.json();
                if (!mzaResult.success || !mzaResult.mza) {
                    throw new Error(mzaResult.error || 'Unable to load MZA data');
                }
                const mzaMap = mzaResult.mza;

                // Load existing workbook or create new one
                let wb;
                if (existingFile) {
                    const arrayBuffer = await existingFile.arrayBuffer();
                    wb = XLSX.read(arrayBuffer, { type: 'array' });
                    // Clear the file input to release file lock
                    existingFileInput.value = '';
                    document.getElementById('existingFileName').textContent = 'New workbook will be created';
                } else {
                    wb = XLSX.utils.book_new();
                }

                const allData = [];
                const excelSci2SigFormat = '0.0E+00';
                const boldRowIndexes = [];
                const regionSigmaRows = [];
                let maxExportColumnIndex = 0;
                allData.push([`${tr(exportLanguage, 'activationData')} - ${tr(exportLanguage, 'allRegions')} - ${tr(exportLanguage, 'activityValuesInBq')}`]);
                allData.push(['']); // Empty row

                for (const regionInfo of currentRegions) {
                    const region = regionInfo.region;

                    const response = await fetch('/api/extract', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            filepath: currentFilePath,
                            region: parseInt(region)
                        })
                    });

                    const result = await response.json();

                    if (result.data) {
                        // Build region table with a second ratio table to the right.
                        const activationColumnCount = 3 + result.times.length;
                        const ratioStartCol = activationColumnCount + 2; // two empty columns separation
                        maxExportColumnIndex = Math.max(maxExportColumnIndex, ratioStartCol + result.times.length);

                        const regionHeaderRow = [];
                        regionHeaderRow[0] = `${tr(exportLanguage, 'region')} ${region}`;
                        regionHeaderRow[ratioStartCol] = `${tr(exportLanguage, 'region')} ${region} - ${tr(exportLanguage, 'activityOverMza')}`;
                        allData.push(regionHeaderRow);
                        allData.push([]); // Empty row

                        // Create paired header rows for activation and ratio tables.
                        const labelsRow = [];
                        const headerRow = [];
                        labelsRow[0] = tr(exportLanguage, 'nuclide');
                        labelsRow[1] = tr(exportLanguage, 'halfLife');
                        labelsRow[2] = tr(exportLanguage, 'unit');
                        headerRow[0] = '';
                        headerRow[1] = '';
                        headerRow[2] = '';

                        labelsRow[ratioStartCol] = tr(exportLanguage, 'mza');
                        headerRow[ratioStartCol] = '';

                        result.times.forEach((time, idx) => {
                            const formattedTime = formatCooldownTime(time, exportLanguage);
                            let label = '';
                            let value = formattedTime;
                            if (formattedTime.includes(':')) {
                                const parts = formattedTime.split(':');
                                label = parts[0].trim();
                                value = (parts[1] || '').trim();
                            }

                            labelsRow[3 + idx] = label;
                            headerRow[3 + idx] = value;

                            labelsRow[ratioStartCol + 1 + idx] = label;
                            headerRow[ratioStartCol + 1 + idx] = value;
                        });

                        allData.push(labelsRow);
                        allData.push(headerRow);

                        const dataStartRow = allData.length;

                        // Add data rows for all isotopes and corresponding Activity/MZA ratios.
                        result.isotopes.forEach(isotope => {
                            const isotopeData = result.data[isotope];
                            const rowIndex = allData.length;
                            const row = [];
                            row[0] = isotope;
                            row[1] = isotopeData.half_life;
                            row[2] = localizeTimeUnit(isotopeData.half_life_unit, exportLanguage);

                            result.times.forEach((time, idx) => {
                                const activity = isotopeData[time] || 0;
                                row[3 + idx] = {
                                    t: 'n',
                                    v: Number(activity),
                                    z: excelSci2SigFormat
                                };
                            });

                            const mza = mzaMap[normalizeNuclideName(isotope)];
                            if (typeof mza === 'number' && mza > 0) {
                                row[ratioStartCol] = {
                                    t: 'n',
                                    v: Number(mza),
                                    z: excelSci2SigFormat
                                };

                                result.times.forEach((time, idx) => {
                                    const activityCellRef = XLSX.utils.encode_cell({ r: rowIndex, c: 3 + idx });
                                    const mzaCellRef = XLSX.utils.encode_cell({ r: rowIndex, c: ratioStartCol });
                                    row[ratioStartCol + 1 + idx] = {
                                        t: 'n',
                                        f: `${activityCellRef}/${mzaCellRef}`,
                                        z: excelSci2SigFormat
                                    };
                                });
                            } else {
                                row[ratioStartCol] = '';
                                result.times.forEach((time, idx) => {
                                    row[ratioStartCol + 1 + idx] = '';
                                });
                            }

                            allData.push(row);
                        });

                        const dataEndRow = allData.length - 1;

                        // Add sigma row (sum of activities and relative activities) for this region.
                        const sigmaRowIndex = allData.length;
                        const sigmaRow = [];
                        sigmaRow[0] = 'Σ';
                        sigmaRow[ratioStartCol] = '';

                        result.times.forEach((time, idx) => {
                            const activityCol = 3 + idx;
                            const ratioCol = ratioStartCol + 1 + idx;
                            const activityStart = XLSX.utils.encode_cell({ r: dataStartRow, c: activityCol });
                            const activityEnd = XLSX.utils.encode_cell({ r: dataEndRow, c: activityCol });
                            const ratioStart = XLSX.utils.encode_cell({ r: dataStartRow, c: ratioCol });
                            const ratioEnd = XLSX.utils.encode_cell({ r: dataEndRow, c: ratioCol });

                            sigmaRow[activityCol] = {
                                t: 'n',
                                f: `SUM(${activityStart}:${activityEnd})`,
                                z: excelSci2SigFormat
                            };
                            sigmaRow[ratioCol] = {
                                t: 'n',
                                f: `SUM(${ratioStart}:${ratioEnd})`,
                                z: excelSci2SigFormat
                            };
                        });

                        allData.push(sigmaRow);
                        boldRowIndexes.push(sigmaRowIndex);

                        if (regionSigmaRows.length < 2) {
                            regionSigmaRows.push({
                                row: sigmaRowIndex,
                                ratioStartCol,
                                timeCount: result.times.length
                            });
                        }

                        // Below second region output, add combined activities row for both regions.
                        if (regionSigmaRows.length === 2 && regionSigmaRows[1].row === sigmaRowIndex) {
                            const combinedRowIndex = allData.length;
                            const combinedRow = [];
                            combinedRow[0] = 'Σобщ';
                            combinedRow[regionSigmaRows[1].ratioStartCol] = '';

                            for (let idx = 0; idx < regionSigmaRows[1].timeCount; idx += 1) {
                                const activityCol = 3 + idx;
                                const r1Cell = XLSX.utils.encode_cell({ r: regionSigmaRows[0].row, c: activityCol });
                                const r2Cell = XLSX.utils.encode_cell({ r: regionSigmaRows[1].row, c: activityCol });
                                combinedRow[activityCol] = {
                                    t: 'n',
                                    f: `${r1Cell}+${r2Cell}`,
                                    z: excelSci2SigFormat
                                };

                                const ratioCol = regionSigmaRows[1].ratioStartCol + 1 + idx;
                                const ratioR1Cell = XLSX.utils.encode_cell({ r: regionSigmaRows[0].row, c: ratioCol });
                                const ratioR2Cell = XLSX.utils.encode_cell({ r: regionSigmaRows[1].row, c: ratioCol });
                                combinedRow[ratioCol] = {
                                    t: 'n',
                                    f: `${ratioR1Cell}+${ratioR2Cell}`,
                                    z: excelSci2SigFormat
                                };
                            }

                            allData.push(combinedRow);
                            boldRowIndexes.push(combinedRowIndex);
                        }

                        allData.push(['']); // Empty row after each region
                        allData.push(['']); // Another empty row
                    } else {
                        console.error(`Error extracting data for region ${region}:`, result.error);
                    }
                }

                const ws = XLSX.utils.aoa_to_sheet(allData);

                // Apply bold font to sigma rows.
                const boldStyle = { font: { bold: true } };
                boldRowIndexes.forEach((rowIndex) => {
                    for (let col = 0; col <= maxExportColumnIndex; col += 1) {
                        const cellRef = XLSX.utils.encode_cell({ r: rowIndex, c: col });
                        if (ws[cellRef]) {
                            ws[cellRef].s = boldStyle;
                        }
                    }
                });

                XLSX.utils.book_append_sheet(wb, ws, sheetName);

                // Save the file
                if (saveHandle) {
                    try {
                        const writable = await saveHandle.createWritable();
                        const data = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                        await writable.write(data);
                        await writable.close();
                    } catch (err) {
                        console.error('Error writing to file', err);
                        // fallback to download
                        const filename = `activation_table_${sheetName.replace(/\s+/g,'_')}.xlsx`;
                        XLSX.writeFile(wb, filename);
                    }
                } else {
                    const filename = `activation_table_${sheetName.replace(/\s+/g,'_')}.xlsx`;
                    XLSX.writeFile(wb, filename);
                }

                showStatus('Data exported successfully!', 'success');
            } catch (error) {
                showStatus('Error exporting data: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Utility functions
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            if (!message) {
                statusEl.style.display = 'none';
                return;
            }
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'block';
        }
    </script>
</body>
</html>
